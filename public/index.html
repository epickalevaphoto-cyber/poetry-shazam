<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PoetryShazam — Поэтические батлы с ИИ</title>
    <style>
        :root {
            --bg-dark: #12100e;
            --card-bg: #1c1815;
            --accent: #d4af37;
            --text-light: #f4efe9;
            --text-muted: #8b796d;
            --recording-red: #ff4a4a;
            --poet2-purple: #9b51e0;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-light);
        }
        .phone-wrapper {
            width: 100%;
            max-width: 440px;
            height: 100vh;
            background-color: var(--bg-dark);
            overflow-y: auto;
            position: relative;
        }
        .screen {
            display: none;
            flex-direction: column;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }
        .screen.active { display: flex; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .app-header {
            text-align: center;
            padding: 15px 0 25px;
            border-bottom: 1px solid rgba(139,121,109,0.15);
            margin-bottom: 20px;
        }
        .logo-main {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }
        .logo-sub {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 4px;
        }
        .grid-container {
            display: grid;
            gap: 12px;
            padding-bottom: 30px;
        }
        .battle-card {
            background: rgba(20,20,28,0.8);
            border: 1px solid rgba(212,175,55,0.15);
            border-radius: 20px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .battle-card.current {
            border-color: #d4af37;
            background: linear-gradient(135deg, rgba(212,175,55,0.05), rgba(20,20,28,0.9));
        }
        .battle-card.completed {
            border-color: rgba(46,204,113,0.4);
            background: rgba(46,204,113,0.05);
        }
        .battle-header {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #8b8b8b;
            margin-bottom: 8px;
        }
        .battle-names {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .battle-scores {
            font-size: 12px;
            color: #d4af37;
            font-family: monospace;
        }
        .status-badge {
            font-size: 10px;
            background: rgba(255,255,255,0.1);
            padding: 2px 10px;
            border-radius: 20px;
        }
        .completed .status-badge {
            background: rgba(46,204,113,0.2);
            color: #2ecc71;
        }
        .poet-card {
            background: rgba(15,15,22,0.8);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .poet-card[data-poet="1"] { border-left: 4px solid #d4af37; }
        .poet-card[data-poet="2"] { border-left: 4px solid #9b51e0; }
        .poet-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }
        .poet-name-input {
            background: transparent;
            border: none;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            padding: 4px 0;
            width: 60%;
        }
        .poet-name-input:focus {
            outline: none;
            border-bottom: 1px solid;
        }
        .poet-card[data-poet="1"] .poet-name-input:focus { border-bottom-color: #d4af37; }
        .poet-card[data-poet="2"] .poet-name-input:focus { border-bottom-color: #9b51e0; }
        .poet-time {
            font-size: 14px;
            color: #8b8b8b;
            font-family: monospace;
        }
        .poem-textarea {
            width: 100%;
            min-height: 140px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 14px;
            color: #f0f0f0;
            font-size: 14px;
            line-height: 1.5;
            resize: vertical;
            margin: 12px 0;
        }
        .poem-textarea:focus {
            outline: none;
            border-color: #d4af37;
        }
        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin: 12px 0 8px;
        }
        .small-btn {
            background: rgba(255,255,255,0.08);
            border: none;
            border-radius: 30px;
            padding: 6px 16px;
            font-size: 12px;
            cursor: pointer;
            color: #ccc;
            transition: all 0.2s;
        }
        .small-btn:hover { background: rgba(255,255,255,0.15); }
        .small-btn.gold { background: rgba(212,175,55,0.15); color: #d4af37; }
        .small-btn.purple { background: rgba(155,81,224,0.15); color: #9b51e0; }
        .recorder-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 15px 0 20px;
        }
        .timer-text {
            font-size: 48px;
            font-family: monospace;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }
        .mic-button-outer {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a1a24, #12121a);
            border: 2px solid #d4af37;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .mic-button-outer.recording {
            border-color: #ff4a4a;
            animation: pulse-ring 1.5s infinite;
        }
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(255,74,74,0.4); }
            70% { box-shadow: 0 0 0 20px rgba(255,74,74,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,74,74,0); }
        }
        .mic-icon-svg {
            width: 32px;
            height: 32px;
            fill: #fff;
        }
        .record-hint {
            font-size: 12px;
            color: #8b8b8b;
            margin-top: 12px;
        }
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #d4af37, #b8941e);
            border: none;
            border-radius: 40px;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #12121a;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212,175,55,0.3);
        }
        .results-table {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 16px;
            margin: 20px 0;
        }
        .criteria-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .criteria-header {
            font-weight: bold;
            color: #d4af37;
            border-bottom-color: #d4af37;
        }
        .col-center { text-align: center; }
        .back-link {
            color: #d4af37;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #d4af37;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2ecc71;
            color: #000;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            z-index: 2000;
            display: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="phone-wrapper">
        <div id="screen-main" class="screen active">
            <div class="app-header">
                <div class="logo-main">POETRYSHAZAM</div>
                <div class="logo-sub">AI ВЫСШАЯ ЛИГА</div>
            </div>
            <div id="tournament-grid"></div>
            <div style="text-align: center; margin-top: 20px;">
                <span style="font-size: 12px; color: #6b6b6b; cursor: pointer;" onclick="resetTournamentGrid()">🔄 Сбросить турнир</span>
            </div>
        </div>

        <div id="screen-battle" class="screen">
            <div class="back-link" onclick="confirmExitBattle()">← К сетке турнира</div>
            <h2 style="font-size: 22px; margin-bottom: 20px;">🎤 Запись батла</h2>
            <div id="poets-container"></div>
            <div class="recorder-container">
                <div id="timer-display" class="timer-text">00:00</div>
                <div id="record-trigger" class="mic-button-outer">
                    <svg class="mic-icon-svg" viewBox="0 0 24 24">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
                    </svg>
                </div>
                <div class="record-hint" id="recording-hint">🎤 Нажмите для записи</div>
            </div>
            <button id="submit-btn" class="submit-btn">🔥 ОТПРАВИТЬ НА ОЦЕНКУ</button>
        </div>

        <div id="screen-details" class="screen">
            <div class="back-link" onclick="closeDetailsAndNext()">← В главное меню</div>
            <h2 id="details-title" style="font-size: 22px;">Анализ батла</h2>
            <div id="details-subtitle" style="color: #8b8b8b; margin-bottom: 20px;"></div>
            <div id="details-content"></div>
            <button class="submit-btn" onclick="closeDetailsAndNext()" style="margin-top: 20px;">СЛЕДУЮЩИЙ БАТЛ</button>
        </div>
    </div>

    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div style="margin-top: 15px; color:#d4af37;">🤖 Обработка...</div>
    </div>
    <div id="toast" class="toast"></div>

    <script>
        const SHEETY_API_URL = "/api/battle";
        
        let currentBattleId = 1;
        let currentRecordingPoet = 1;
        let recordingTimer = null;
        let recordingSeconds = 0;
        let recognition = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let audioBlobs = { 1: null, 2: null };
        let audioUrls = { 1: null, 2: null };
        let isRecording = false;
        let currentTranscript = "";
        let lastRecognizedText = "";

        const tournamentBattles = {};
        for (let i = 1; i <= 10; i++) {
            tournamentBattles[i] = {
                id: i, completed: false,
                p1Name: `Поэт №${i}.1`, p2Name: `Поэт №${i}.2`,
                p1Time: "00:00", p2Time: "00:00",
                p1Text: "", p2Text: "",
                p1Content: 0, p1Delivery: 0, p2Content: 0, p2Delivery: 0,
                totalVerdict: "", p1Critique: "", p2Critique: "", rawDetails: null
            };
        }

        function loadTournamentData() {
            const saved = localStorage.getItem('poetryShazamTournament');
            if (saved) {
                const data = JSON.parse(saved);
                currentBattleId = data.currentBattleId;
                for (let i = 1; i <= 10; i++) {
                    if (data.tournamentBattles[i]) Object.assign(tournamentBattles[i], data.tournamentBattles[i]);
                }
            }
            renderTournamentGrid();
        }

        function saveTournamentData() {
            const dataToSave = { currentBattleId: currentBattleId, tournamentBattles: {} };
            for (let i = 1; i <= 10; i++) {
                const b = tournamentBattles[i];
                dataToSave.tournamentBattles[i] = { ...b };
            }
            localStorage.setItem('poetryShazamTournament', JSON.stringify(dataToSave));
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        function formatPoemText(rawText) {
            if (!rawText) return "";
            let text = rawText.replace(/\s+/g, ' ').trim();
            if (text.length > 0) {
                text = text.charAt(0).toUpperCase() + text.slice(1);
            }
            let sentences = [];
            if (text.includes('.') || text.includes('!') || text.includes('?')) {
                sentences = text.split(/(?<=[.!?])\s+/);
            } else {
                const words = text.split(' ');
                let currentLine = '';
                for (let i = 0; i < words.length; i++) {
                    const word = words[i];
                    if ((currentLine + ' ' + word).length < 50) {
                        currentLine += (currentLine ? ' ' : '') + word;
                    } else {
                        if (currentLine) sentences.push(currentLine);
                        currentLine = word;
                    }
                }
                if (currentLine) sentences.push(currentLine);
            }
            let formattedSentences = sentences.map(s => {
                let trimmed = s.trim();
                if (trimmed.length === 0) return trimmed;
                const lastChar = trimmed.charAt(trimmed.length - 1);
                if (!['.', '!', '?'].includes(lastChar)) {
                    return trimmed + '.';
                }
                return trimmed;
            });
            let formattedText = formattedSentences.join('\n');
            formattedText = formattedText.replace(/ что /g, ', что ');
            formattedText = formattedText.replace(/ который /g, ', который ');
            formattedText = formattedText.replace(/ которая /g, ', которая ');
            formattedText = formattedText.replace(/ где /g, ', где ');
            formattedText = formattedText.replace(/ когда /g, ', когда ');
            formattedText = formattedText.replace(/ но /g, ', но ');
            formattedText = formattedText.replace(/ потому что /g, ', потому что ');
            return formattedText;
        }

        function formatPoem(poetNum) {
            const textarea = document.getElementById(`poem${poetNum}-text`);
            if (textarea) {
                const formatted = formatPoemText(textarea.value);
                textarea.value = formatted;
                const battle = tournamentBattles[currentBattleId];
                if (poetNum === 1) battle.p1Text = formatted;
                else battle.p2Text = formatted;
                saveTournamentData();
                showToast(`✨ Текст отформатирован`);
            }
        }

        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                showToast("❌ Распознавание не поддерживается");
                return false;
            }
            if (recognition) {
                try { recognition.stop(); } catch(e) {}
                recognition = null;
            }
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'ru-RU';
            
            recognition.onstart = () => {
                console.log("✅ Распознавание началось");
                showToast("🎤 Слушаю...");
            };
            
            recognition.onresult = (event) => {
                let interim = "", final = "";
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        final += event.results[i][0].transcript + " ";
                    } else {
                        interim += event.results[i][0].transcript;
                    }
                }
                lastRecognizedText += final;
                currentTranscript = lastRecognizedText + interim;
                
                const textarea = currentRecordingPoet === 1 ? document.getElementById('poem1-text') : document.getElementById('poem2-text');
                if (textarea) {
                    textarea.value = currentTranscript;
                }
            };
            
            recognition.onerror = (event) => {
                console.error("Recognition error:", event.error);
                if (event.error === 'not-allowed') {
                    alert("❌ Разрешите доступ к микрофону!");
                    if (isRecording) {
                        isRecording = false;
                        document.getElementById('record-trigger').classList.remove('recording');
                    }
                }
            };
            
            recognition.onend = () => {
                console.log("Распознавание завершено");
                if (isRecording) {
                    setTimeout(() => {
                        if (isRecording && recognition) {
                            try { recognition.start(); } catch(e) {}
                        }
                    }, 300);
                }
            };
            return true;
        }

        async function startAudioRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = (event) => { if (event.data.size > 0) audioChunks.push(event.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    audioBlobs[currentRecordingPoet] = blob;
                    if (audioUrls[currentRecordingPoet]) URL.revokeObjectURL(audioUrls[currentRecordingPoet]);
                    audioUrls[currentRecordingPoet] = URL.createObjectURL(blob);
                    stream.getTracks().forEach(track => track.stop());
                    const audioControl = document.getElementById(`audio-control-${currentRecordingPoet}`);
                    if (audioControl) audioControl.style.display = 'flex';
                    showToast(`🎤 Аудио сохранено (${Math.round(blob.size/1024)} KB)`);
                };
                mediaRecorder.start(1000);
                return true;
            } catch(err) {
                alert("❌ Нет доступа к микрофону");
                return false;
            }
        }

        function stopAudioRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
        }

        async function startRecording() {
            if (!recognition && !initSpeechRecognition()) return false;
            isRecording = true;
            lastRecognizedText = "";
            currentTranscript = "";
            const textarea = currentRecordingPoet === 1 ? document.getElementById('poem1-text') : document.getElementById('poem2-text');
            if (textarea) textarea.value = "";
            const audioStarted = await startAudioRecording();
            if (!audioStarted) { isRecording = false; return false; }
            try {
                recognition.start();
                startTimer();
                return true;
            } catch(e) { return false; }
        }

        async function stopRecording() {
            console.log("🛑 stopRecording вызвана, poet:", currentRecordingPoet);
            isRecording = false;
            if (recognition) { try { recognition.stop(); } catch(e) {} }
            stopAudioRecording();
            const seconds = stopTimer();
            document.getElementById('record-trigger').classList.remove('recording');
            const battle = tournamentBattles[currentBattleId];
            
            let finalText = currentTranscript.trim();
            if (!finalText) {
                const textarea = currentRecordingPoet === 1 ? document.getElementById('poem1-text') : document.getElementById('poem2-text');
                if (textarea) {
                    finalText = textarea.value.trim();
                }
            }
            
            let formattedText = finalText;
            if (finalText) {
                formattedText = formatPoemText(finalText);
            }
            
            // ✅ СОХРАНЯЕМ ТОЛЬКО В ТЕКУЩЕГО ПОЭТА
            if (currentRecordingPoet === 1) {
                battle.p1Time = formatTime(seconds);
                battle.p1Text = formattedText;
                document.getElementById(`poet1-time`).innerText = formatTime(seconds);
                const textarea = document.getElementById('poem1-text');
                if (textarea) textarea.value = finalText;
                console.log("✅ Сохранено в поэта 1, длина:", finalText.length);
            } else if (currentRecordingPoet === 2) {
                battle.p2Time = formatTime(seconds);
                battle.p2Text = formattedText;
                document.getElementById(`poet2-time`).innerText = formatTime(seconds);
                const textarea = document.getElementById('poem2-text');
                if (textarea) textarea.value = finalText;
                console.log("✅ Сохранено в поэта 2, длина:", finalText.length);
            }
            
            saveTournamentData();
            showToast(`✅ Текст сохранён (${finalText.length || 0} симв.)`);
            return seconds;
        }

        function startTimer() {
            recordingSeconds = 0;
            document.getElementById('timer-display').innerText = "00:00";
            if(recordingTimer) clearInterval(recordingTimer);
            recordingTimer = setInterval(() => {
                recordingSeconds++;
                document.getElementById('timer-display').innerText = formatTime(recordingSeconds);
            }, 1000);
        }

        function stopTimer() {
            if(recordingTimer) clearInterval(recordingTimer);
            recordingTimer = null;
            return recordingSeconds;
        }

        function formatTime(sec) {
            let m = Math.floor(sec / 60);
            let s = sec % 60;
            return `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
        }

        function savePoemText(poetNum) {
            const battle = tournamentBattles[currentBattleId];
            const textarea = document.getElementById(`poem${poetNum}-text`);
            if (textarea) {
                const text = textarea.value.trim();
                const formattedText = formatPoemText(text);
                if (poetNum === 1) battle.p1Text = formattedText;
                else battle.p2Text = formattedText;
                saveTournamentData();
                showToast(`✅ Текст сохранён (${text.length} симв.)`);
            }
        }

        function downloadAudio(poetNum) {
            if (audioBlobs[poetNum]) {
                const url = URL.createObjectURL(audioBlobs[poetNum]);
                const a = document.createElement('a');
                a.href = url;
                a.download = `poet${poetNum}_battle${currentBattleId}.webm`;
                a.click();
                URL.revokeObjectURL(url);
                showToast(`📥 Аудио скачано`);
            } else { alert("Нет аудио"); }
        }

        function playAudio(poetNum) {
            if (audioUrls[poetNum]) new Audio(audioUrls[poetNum]).play();
            else alert("Нет аудио");
        }

        async function submitBattle() {
            const battle = tournamentBattles[currentBattleId];
            battle.p1Text = document.getElementById('poem1-text')?.value || "";
            battle.p2Text = document.getElementById('poem2-text')?.value || "";
            battle.p1Name = document.getElementById('poet1-name')?.value || battle.p1Name;
            battle.p2Name = document.getElementById('poet2-name')?.value || battle.p2Name;
            
            battle.p1Text = formatPoemText(battle.p1Text);
            battle.p2Text = formatPoemText(battle.p2Text);
            
            if (!battle.p1Text || battle.p1Text.length < 10) {
                alert(`⚠️ Текст Поэта 1 слишком короткий (${battle.p1Text?.length || 0} симв.)`);
                return;
            }
            if (!battle.p2Text || battle.p2Text.length < 10) {
                alert(`⚠️ Текст Поэта 2 слишком короткий (${battle.p2Text?.length || 0} симв.)`);
                return;
            }
            
            showLoading(true);
            try {
                const response = await fetch(SHEETY_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: battle.id, p1Name: battle.p1Name, p1Text: battle.p1Text, p1Time: battle.p1Time,
                        p2Name: battle.p2Name, p2Text: battle.p2Text, p2Time: battle.p2Time
                    })
                });
                const result = await response.json();
                if(result.status === "success") {
                    battle.p1Content = parseFloat(result.p1Content);
                    battle.p1Delivery = parseFloat(result.p1Delivery);
                    battle.p2Content = parseFloat(result.p2Content);
                    battle.p2Delivery = parseFloat(result.p2Delivery);
                    battle.totalVerdict = result.totalVerdict;
                    battle.p1Critique = result.p1Critique;
                    battle.p2Critique = result.p2Critique;
                    battle.rawDetails = result.rawDetails;
                    battle.completed = true;
                    saveTournamentData();
                    renderTournamentGrid();
                    openDetailsScreen(battle);
                } else throw new Error(result.message);
            } catch(err) { alert("❌ Ошибка: " + err.message); }
            finally { showLoading(false); }
        }

        function openDetailsScreen(battle) {
            document.getElementById('details-title').innerText = `Анализ батла №${battle.id}`;
            document.getElementById('details-subtitle').innerText = `${battle.p1Name} VS ${battle.p2Name}`;
            const details = battle.rawDetails || {};
            document.getElementById('details-content').innerHTML = `
                <div class="results-table">
                    <div class="criteria-row criteria-header">
                        <div>Критерии оценки</div>
                        <div class="col-center">${battle.p1Name}</div>
                        <div class="col-center">${battle.p2Name}</div>
                    </div>
                    <div class="criteria-row"><div>📝 Содержание</div><div class="col-center">${battle.p1Content}/5</div><div class="col-center">${battle.p2Content}/5</div></div>
                    <div class="criteria-row"><div>🎙️ Подача</div><div class="col-center">${battle.p1Delivery}/5</div><div class="col-center">${battle.p2Delivery}/5</div></div>
                    <div class="criteria-row"><div>⏱️ Время</div><div class="col-center">${battle.p1Time}</div><div class="col-center">${battle.p2Time}</div></div>
                </div>
                <div style="background:rgba(212,175,55,0.1); border-radius:20px; padding:16px; margin-top:16px;">
                    <div style="font-weight:bold; color:#d4af37;">🏆 ВЕРДИКТ</div>
                    <p>${battle.totalVerdict}</p>
                </div>
                <div style="margin-top:16px;"><div style="font-weight:bold; color:#d4af37;">📖 РАЗБОР: ${battle.p1Name}</div><p>${battle.p1Critique}</p></div>
                <div style="margin-top:16px;"><div style="font-weight:bold; color:#d4af37;">📖 РАЗБОР: ${battle.p2Name}</div><p>${battle.p2Critique}</p></div>
            `;
            showScreen('screen-details');
        }

        function closeDetailsAndNext() {
            if (currentBattleId < 10) {
                currentBattleId++;
                currentRecordingPoet = 1;
                audioBlobs = { 1: null, 2: null };
                audioUrls = { 1: null, 2: null };
                saveTournamentData();
                renderTournamentGrid();
                renderPoetCards(tournamentBattles[currentBattleId]);
                showScreen('screen-battle');
                showToast(`✅ Батл завершен! Теперь батл №${currentBattleId}`);
            } else {
                showToast("🏆 ТУРНИР ЗАВЕРШЕН! Поздравляем! 🏆");
                showScreen('screen-main');
            }
        }

        function renderTournamentGrid() {
            const container = document.getElementById('tournament-grid');
            container.innerHTML = '';
            for(let i=1; i<=10; i++) {
                const b = tournamentBattles[i];
                const card = document.createElement('div');
                card.className = `battle-card ${b.completed ? 'completed' : ''} ${i===currentBattleId && !b.completed ? 'current' : ''}`;
                if(b.completed) {
                    let avg1 = ((b.p1Content + b.p1Delivery)/2).toFixed(1);
                    let avg2 = ((b.p2Content + b.p2Delivery)/2).toFixed(1);
                    card.innerHTML = `<div class="battle-header"><span>БАТЛ №${b.id}</span><span class="status-badge">✅ Завершен</span></div>
                        <div class="battle-names">${b.p1Name} VS ${b.p2Name}</div>
                        <div class="battle-scores">${avg1} : ${avg2}</div>`;
                    card.onclick = () => openDetailsScreen(b);
                } else {
                    card.innerHTML = `<div class="battle-header"><span>БАТЛ №${b.id}</span>${i===currentBattleId ? '<span class="status-badge" style="background:#d4af37;color:#000;">⭐ Текущий</span>' : ''}</div>
                        <div class="battle-names">${b.p1Name} VS ${b.p2Name}</div>
                        <div class="battle-scores" style="color:#6b6b6b;">⏳ Ожидание</div>`;
                    if(i===currentBattleId) card.onclick = () => goToBattleScreen(i);
                }
                container.appendChild(card);
            }
        }

        function goToBattleScreen(battleId) {
            currentBattleId = battleId;
            currentRecordingPoet = 1;
            const battle = tournamentBattles[battleId];
            renderPoetCards(battle);
            showScreen('screen-battle');
        }

        function renderPoetCards(battle) {
            const container = document.getElementById('poets-container');
            container.innerHTML = `
                <div class="poet-card" data-poet="1">
                    <div class="poet-header">
                        <input type="text" id="poet1-name" class="poet-name-input" value="${battle.p1Name}">
                        <span class="poet-time" id="poet1-time">${battle.p1Time}</span>
                    </div>
                    <textarea id="poem1-text" class="poem-textarea" placeholder="Текст появится автоматически">${battle.p1Text || ''}</textarea>
                    <div class="button-group">
                        <button class="small-btn gold" onclick="savePoemText(1)">💾 Сохранить текст</button>
                        <button class="small-btn gold" onclick="downloadAudio(1)">📥 Скачать аудио</button>
                        <button class="small-btn gold" onclick="formatPoem(1)">✨ Форматировать</button>
                    </div>
                    <div id="audio-control-1" style="display:${audioBlobs[1] ? 'flex' : 'none'}; gap: 8px; margin-top: 8px;">
                        <button class="small-btn gold" onclick="playAudio(1)">🔊 Прослушать</button>
                    </div>
                </div>
                <div class="poet-card" data-poet="2">
                    <div class="poet-header">
                        <input type="text" id="poet2-name" class="poet-name-input" value="${battle.p2Name}">
                        <span class="poet-time" id="poet2-time">${battle.p2Time}</span>
                    </div>
                    <textarea id="poem2-text" class="poem-textarea" placeholder="Текст появится автоматически">${battle.p2Text || ''}</textarea>
                    <div class="button-group">
                        <button class="small-btn purple" onclick="savePoemText(2)">💾 Сохранить текст</button>
                        <button class="small-btn purple" onclick="downloadAudio(2)">📥 Скачать аудио</button>
                        <button class="small-btn purple" onclick="formatPoem(2)">✨ Форматировать</button>
                    </div>
                    <div id="audio-control-2" style="display:${audioBlobs[2] ? 'flex' : 'none'}; gap: 8px; margin-top: 8px;">
                        <button class="small-btn purple" onclick="playAudio(2)">🔊 Прослушать</button>
                    </div>
                </div>
            `;
        }

        function showScreen(screenId) {
            if(isRecording && screenId !== 'screen-battle' && !confirm("Запись активна. Остановить и выйти?")) return;
            if(isRecording) stopRecording();
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function confirmExitBattle() {
            if(isRecording && !confirm("Запись активна. Остановить и выйти?")) return;
            if(isRecording) stopRecording();
            showScreen('screen-main');
        }

        function resetTournamentGrid() {
            if(confirm("Сбросить турнир?")) {
                currentBattleId = 1;
                currentRecordingPoet = 1;
                audioBlobs = { 1: null, 2: null };
                audioUrls = { 1: null, 2: null };
                for(let i=1; i<=10; i++) {
                    tournamentBattles[i] = {
                        id: i, completed: false,
                        p1Name: `Поэт №${i}.1`, p2Name: `Поэт №${i}.2`,
                        p1Time: "00:00", p2Time: "00:00",
                        p1Text: "", p2Text: "",
                        p1Content: 0, p1Delivery: 0, p2Content: 0, p2Delivery: 0,
                        totalVerdict: "", p1Critique: "", p2Critique: "", rawDetails: null
                    };
                }
                saveTournamentData();
                renderTournamentGrid();
                showScreen('screen-main');
                showToast("🔄 Турнир сброшен");
            }
        }

        function showLoading(show) { document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none'; }

        document.addEventListener('DOMContentLoaded', () => {
            loadTournamentData();
            initSpeechRecognition();
            document.getElementById('submit-btn').addEventListener('click', submitBattle);
            
            const recordBtn = document.getElementById('record-trigger');
            const hintElem = document.getElementById('recording-hint');
            let poet1Recorded = false;
            let poet2Recorded = false;
            
            recordBtn.addEventListener('click', async () => {
                const battle = tournamentBattles[currentBattleId];
                
                if(!recordBtn.classList.contains('recording')) {
                    // НАЧАЛО ЗАПИСИ
                    if (currentRecordingPoet === 1) {
                        battle.p1Name = document.getElementById('poet1-name').value.trim() || battle.p1Name;
                    } else {
                        battle.p2Name = document.getElementById('poet2-name').value.trim() || battle.p2Name;
                    }
                    recordBtn.classList.add('recording');
                    hintElem.innerHTML = "🔴 ЗАПИСЬ... Нажмите ещё раз для остановки";
                    await startRecording();
                } else {
                    // ОСТАНОВКА ЗАПИСИ
                    await stopRecording();
                    
                    if (currentRecordingPoet === 1) {
                        poet1Recorded = true;
                        currentRecordingPoet = 2;
                        recordBtn.classList.remove('recording');
                        hintElem.innerHTML = "🎤 Нажмите для записи Поэта 2";
                        saveTournamentData();
                        renderPoetCards(tournamentBattles[currentBattleId]);
                        showToast("✅ Текст Поэта 1 сохранён");
                    } else if (currentRecordingPoet === 2) {
                        poet2Recorded = true;
                        currentRecordingPoet = 1;
                        recordBtn.classList.remove('recording');
                        hintElem.innerHTML = "🎤 Нажмите для записи";
                        saveTournamentData();
                        showToast("✅ Оба текста сохранены. Нажмите 'ОТПРАВИТЬ НА ОЦЕНКУ'");
                    }
                }
            });
        });
    </script>
</body>
</html>
