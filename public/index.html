<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PoetryShazam — Поэтические батлы с ИИ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at 10% 20%, #0a0a0f, #050508);
            color: #f0f0f0;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        .tournament-header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            margin-bottom: 25px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 30%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .battle-card {
            background: rgba(20, 20, 28, 0.8);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .battle-card.completed {
            border-color: rgba(46, 204, 113, 0.5);
            background: rgba(46, 204, 113, 0.05);
        }

        .battle-card.current {
            border-color: #d4af37;
            background: rgba(212, 175, 55, 0.1);
        }

        .battle-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 12px;
            color: #888;
        }

        .battle-names {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .battle-scores {
            font-size: 12px;
            color: #d4af37;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        .back-btn {
            color: #d4af37;
            margin-bottom: 20px;
            cursor: pointer;
            display: inline-block;
        }

        .poet-block {
            background: rgba(15, 15, 22, 0.8);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .poet-block.poet-1 {
            border-left: 4px solid #d4af37;
        }

        .poet-block.poet-2 {
            border-left: 4px solid #9b51e0;
        }

        .poet-name-input {
            background: transparent;
            border: none;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            width: 70%;
            padding: 5px 0;
        }

        .poet-name-input:focus {
            outline: none;
            border-bottom: 1px solid #d4af37;
        }

        .poet-time {
            font-size: 14px;
            color: #888;
            font-family: monospace;
        }

        .poem-text {
            width: 100%;
            min-height: 120px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 12px;
            color: #fff;
            font-size: 14px;
            line-height: 1.5;
            resize: vertical;
            margin: 12px 0;
            font-family: inherit;
        }

        .poem-text:focus {
            outline: none;
            border-color: #d4af37;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .small-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
            color: #ccc;
            transition: all 0.2s;
        }

        .small-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .mic-area {
            text-align: center;
            margin: 20px 0;
        }

        .mic-button {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a1a24, #12121a);
            border: 2px solid #d4af37;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mic-button.recording {
            border-color: #e74c3c;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(231, 76, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        .mic-button svg {
            width: 32px;
            height: 32px;
            fill: #fff;
        }

        .timer {
            font-size: 36px;
            font-family: monospace;
            margin-top: 10px;
        }

        .mic-hint {
            font-size: 12px;
            color: #888;
            margin-top: 8px;
        }

        .submit-btn {
            width: 100%;
            background: transparent;
            border: 2px solid rgba(212, 175, 55, 0.5);
            border-radius: 40px;
            padding: 14px;
            font-size: 14px;
            font-weight: 600;
            color: #d4af37;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s;
        }

        .submit-btn:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: #d4af37;
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .results-card {
            background: rgba(20, 20, 28, 0.8);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .score-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .score-label {
            color: #d4af37;
            font-weight: 600;
        }

        .verdict {
            background: rgba(212, 175, 55, 0.1);
            border-radius: 16px;
            padding: 16px;
            margin: 16px 0;
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #d4af37;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2ecc71;
            color: #000;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            z-index: 2000;
            display: none;
            white-space: nowrap;
        }

        .toast.error {
            background: #e74c3c;
            color: #fff;
        }

        .toast.warning {
            background: #f39c12;
        }

        h2 {
            margin-bottom: 20px;
            font-size: 22px;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .recognition-status {
            font-size: 11px;
            color: #9b51e0;
            margin-top: 5px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="tournamentScreen">
            <div class="tournament-header">
                <div class="logo">POETRYSHAZAM</div>
                <div style="font-size: 10px; color: #666; margin-top: 5px;">БАТЛЫ С ИИ</div>
            </div>
            <div id="battlesList"></div>
            <div style="text-align: center; margin-top: 20px;">
                <span style="font-size: 12px; color: #666; cursor: pointer;" onclick="resetTournament()">🔄 СБРОСИТЬ ТУРНИР</span>
                <span style="font-size: 12px; color: #666; cursor: pointer; margin-left: 15px;" onclick="checkMicrophone()">🎤 ПРОВЕРИТЬ МИКРОФОН</span>
            </div>
        </div>

        <div id="battleScreen" class="screen">
            <div class="back-btn" onclick="exitBattle()">← К ТУРНИРУ</div>
            
            <div class="poet-block poet-1">
                <div class="flex-between">
                    <input type="text" id="poet1Name" class="poet-name-input" placeholder="Имя поэта 1">
                    <span class="poet-time" id="poet1Time">00:00</span>
                </div>
                <textarea id="poet1Text" class="poem-text" placeholder="Текст появится автоматически после записи"></textarea>
                <div class="button-group">
                    <button class="small-btn" onclick="downloadAudio(1)">📥 Скачать аудио</button>
                    <button class="small-btn" onclick="playAudio(1)">▶ Прослушать</button>
                </div>
                <div id="audio1Info" style="display: none; font-size: 11px; color: #2ecc71; margin-top: 8px;">✅ Аудио записано</div>
            </div>

            <div class="poet-block poet-2">
                <div class="flex-between">
                    <input type="text" id="poet2Name" class="poet-name-input" placeholder="Имя поэта 2">
                    <span class="poet-time" id="poet2Time">00:00</span>
                </div>
                <textarea id="poet2Text" class="poem-text" placeholder="Текст появится автоматически после записи"></textarea>
                <div class="button-group">
                    <button class="small-btn" onclick="downloadAudio(2)">📥 Скачать аудио</button>
                    <button class="small-btn" onclick="playAudio(2)">▶ Прослушать</button>
                </div>
                <div id="audio2Info" style="display: none; font-size: 11px; color: #2ecc71; margin-top: 8px;">✅ Аудио записано</div>
            </div>

            <div class="mic-area">
                <div class="mic-button" id="micBtn">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
                    </svg>
                </div>
                <div class="timer" id="timer">00:00</div>
                <div class="mic-hint" id="micHint">🎤 Нажмите для записи Поэта 1</div>
                <div class="recognition-status" id="recognitionStatus"></div>
            </div>

            <button class="submit-btn" id="submitBtn">✧ ОТПРАВИТЬ НА ОЦЕНКУ ✧</button>
        </div>

        <div id="resultsScreen" class="screen">
            <div class="back-btn" onclick="backToTournament()">← К ТУРНИРУ</div>
            <h2 id="resultsTitle">Анализ батла</h2>
            <div id="resultsContent"></div>
        </div>
    </div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div style="margin-top: 15px; color: #d4af37;">🤖 Оценка стихов...</div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        // ДАННЫЕ
        let tournament = [];
        let currentBattleId = 0;
        let currentPoet = 1;
        let isRecording = false;
        let recordingTimer = null;
        let recordingSeconds = 0;
        
        // Web Speech API
        let recognition = null;
        let finalTranscript = '';
        
        // Аудио для скачивания
        let mediaRecorder = null;
        let audioChunks = [];
        let audioBlobs = { 1: null, 2: null };
        let audioUrls = { 1: null, 2: null };
        let mediaStream = null;
        
        // ИНИЦИАЛИЗАЦИЯ
        function initTournament() {
            const saved = localStorage.getItem('poetryTournament');
            if (saved) {
                tournament = JSON.parse(saved);
                currentBattleId = tournament.findIndex(b => !b.completed);
                if (currentBattleId === -1) currentBattleId = 0;
            } else {
                for (let i = 0; i < 10; i++) {
                    tournament.push({
                        id: i,
                        completed: false,
                        p1Name: `Поэт ${i+1}.1`,
                        p2Name: `Поэт ${i+1}.2`,
                        p1Time: "00:00",
                        p2Time: "00:00",
                        p1Text: "",
                        p2Text: "",
                        p1Content: 0,
                        p1Delivery: 0,
                        p2Content: 0,
                        p2Delivery: 0,
                        p1Critique: "",
                        p2Critique: "",
                        verdict: ""
                    });
                }
                currentBattleId = 0;
            }
            renderTournament();
        }
        
        function saveTournament() {
            localStorage.setItem('poetryTournament', JSON.stringify(tournament));
        }
        
        function renderTournament() {
            const container = document.getElementById('battlesList');
            if (!container) return;
            container.innerHTML = '';
            
            tournament.forEach((battle, idx) => {
                const div = document.createElement('div');
                div.className = `battle-card ${battle.completed ? 'completed' : ''} ${idx === currentBattleId && !battle.completed ? 'current' : ''}`;
                
                if (battle.completed) {
                    const total1 = ((battle.p1Content + battle.p1Delivery) / 2).toFixed(1);
                    const total2 = ((battle.p2Content + battle.p2Delivery) / 2).toFixed(1);
                    div.innerHTML = `
                        <div class="battle-header">
                            <span>БАТЛ ${idx + 1}</span>
                            <span>✅ Завершен</span>
                        </div>
                        <div class="battle-names">${escapeHtml(battle.p1Name)} VS ${escapeHtml(battle.p2Name)}</div>
                        <div class="battle-scores">${total1} — ${total2}</div>
                    `;
                    div.onclick = () => showResults(battle);
                } else {
                    div.innerHTML = `
                        <div class="battle-header">
                            <span>БАТЛ ${idx + 1}</span>
                            ${idx === currentBattleId ? '<span>⭐ ТЕКУЩИЙ</span>' : ''}
                        </div>
                        <div class="battle-names">${escapeHtml(battle.p1Name)} VS ${escapeHtml(battle.p2Name)}</div>
                        <div class="battle-scores">⏳ Ожидает</div>
                    `;
                    if (idx === currentBattleId) {
                        div.onclick = () => openBattle(idx);
                    }
                }
                container.appendChild(div);
            });
        }
        
        function openBattle(battleId) {
            currentBattleId = battleId;
            const battle = tournament[battleId];
            
            document.getElementById('poet1Name').value = battle.p1Name;
            document.getElementById('poet2Name').value = battle.p2Name;
            document.getElementById('poet1Text').value = battle.p1Text || '';
            document.getElementById('poet2Text').value = battle.p2Text || '';
            document.getElementById('poet1Time').innerText = battle.p1Time;
            document.getElementById('poet2Time').innerText = battle.p2Time;
            
            document.getElementById('audio1Info').style.display = audioBlobs[1] ? 'block' : 'none';
            document.getElementById('audio2Info').style.display = audioBlobs[2] ? 'block' : 'none';
            
            currentPoet = 1;
            document.getElementById('micHint').innerHTML = "🎤 Нажмите для записи Поэта 1";
            document.getElementById('recognitionStatus').innerHTML = '';
            
            document.getElementById('tournamentScreen').style.display = 'none';
            document.getElementById('battleScreen').classList.add('active');
            document.getElementById('resultsScreen').classList.remove('active');
        }
        
        // ============ WEB SPEECH API (работает!) ============
        function startWebSpeech() {
            return new Promise((resolve, reject) => {
                // Проверяем поддержку
                if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                    reject(new Error("Web Speech API не поддерживается"));
                    return;
                }
                
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.lang = 'ru-RU';
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.maxAlternatives = 1;
                
                finalTranscript = '';
                
                recognition.onstart = () => {
                    console.log("🎙️ Распознавание началось");
                    document.getElementById('recognitionStatus').innerHTML = '🎙️ Слушаем... Говорите';
                    resolve(true);
                };
                
                recognition.onresult = (event) => {
                    let interimTranscript = '';
                    
                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        const transcript = event.results[i][0].transcript;
                        if (event.results[i].isFinal) {
                            finalTranscript += transcript + ' ';
                            console.log("✅ Финальный текст:", finalTranscript);
                        } else {
                            interimTranscript += transcript;
                        }
                    }
                    
                    const textarea = document.getElementById(`poet${currentPoet}Text`);
                    if (textarea) {
                        textarea.value = finalTranscript + interimTranscript;
                        // Сохраняем текст
                        if (currentPoet === 1) tournament[currentBattleId].p1Text = textarea.value;
                        else tournament[currentBattleId].p2Text = textarea.value;
                        saveTournament();
                    }
                    
                    // Обновляем статус
                    if (interimTranscript) {
                        document.getElementById('recognitionStatus').innerHTML = `🎙️ ${interimTranscript.substring(0, 40)}...`;
                    } else if (finalTranscript) {
                        document.getElementById('recognitionStatus').innerHTML = `✅ Распознано: ${finalTranscript.length} симв.`;
                    }
                };
                
                recognition.onerror = (event) => {
                    console.error("Ошибка распознавания:", event.error);
                    document.getElementById('recognitionStatus').innerHTML = `⚠️ Ошибка: ${event.error}`;
                    reject(new Error(event.error));
                };
                
                recognition.onend = () => {
                    console.log("🎙️ Распознавание остановлено");
                    if (isRecording) {
                        // Если запись ещё активна, перезапускаем
                        try {
                            recognition.start();
                        } catch(e) {
                            console.log("Не удалось перезапустить");
                        }
                    }
                };
                
                recognition.start();
            });
        }
        
        function stopWebSpeech() {
            if (recognition) {
                try {
                    recognition.stop();
                } catch(e) {}
                recognition = null;
            }
        }
        
        // ============ ЗАПИСЬ АУДИО ============
        async function startAudioRecording() {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                let mimeType = 'audio/webm';
                if (!MediaRecorder.isTypeSupported('audio/webm')) {
                    mimeType = 'audio/mp4';
                }
                
                mediaRecorder = new MediaRecorder(mediaStream, { mimeType });
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };
                
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    audioBlobs[currentPoet] = blob;
                    if (audioUrls[currentPoet]) URL.revokeObjectURL(audioUrls[currentPoet]);
                    audioUrls[currentPoet] = URL.createObjectURL(blob);
                    
                    document.getElementById(`audio${currentPoet}Info`).style.display = 'block';
                    
                    if (mediaStream) {
                        mediaStream.getTracks().forEach(track => track.stop());
                        mediaStream = null;
                    }
                    
                    showToast(`🎵 Аудио сохранено (${(blob.size/1024).toFixed(1)} KB)`, 'success');
                };
                
                mediaRecorder.start(1000);
                return true;
            } catch(err) {
                console.error('Microphone error:', err);
                showToast("❌ Нет доступа к микрофону", 'error');
                return false;
            }
        }
        
        function stopAudioRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
        }
        
        // ============ ОСНОВНЫЕ ФУНКЦИИ ЗАПИСИ ============
        async function startRecording() {
            if (isRecording) return;
            
            // Сохраняем имя поэта
            const battle = tournament[currentBattleId];
            if (currentPoet === 1) {
                battle.p1Name = document.getElementById('poet1Name').value || `Поэт ${currentBattleId+1}.1`;
            } else {
                battle.p2Name = document.getElementById('poet2Name').value || `Поэт ${currentBattleId+1}.2`;
            }
            saveTournament();
            renderTournament();
            
            isRecording = true;
            startTimer();
            document.getElementById('micBtn').classList.add('recording');
            document.getElementById('micHint').innerHTML = "🔴 ЗАПИСЬ... Нажмите для остановки";
            
            // Запускаем Web Speech
            try {
                await startWebSpeech();
                await startAudioRecording();
            } catch(err) {
                console.error("Ошибка запуска:", err);
                showToast("⚠️ Не удалось запустить распознавание речи", 'warning');
                isRecording = false;
                stopTimer();
                document.getElementById('micBtn').classList.remove('recording');
                document.getElementById('micHint').innerHTML = "🎤 Нажмите для записи (проверьте микрофон)";
            }
        }
        
        function stopRecording() {
            if (!isRecording) return;
            
            isRecording = false;
            stopTimer();
            stopWebSpeech();
            stopAudioRecording();
            
            document.getElementById('micBtn').classList.remove('recording');
            
            // Сохраняем время и переключаем поэта
            const battle = tournament[currentBattleId];
            const timeDisplay = document.getElementById('timer').innerText;
            
            if (currentPoet === 1) {
                battle.p1Time = timeDisplay;
                document.getElementById('poet1Time').innerText = timeDisplay;
                currentPoet = 2;
                document.getElementById('micHint').innerHTML = "🎤 Нажмите для записи Поэта 2";
                document.getElementById('recognitionStatus').innerHTML = '';
                showToast("✅ Поэт 1 записан. Теперь запишите Поэта 2", 'success');
            } else {
                battle.p2Time = timeDisplay;
                document.getElementById('poet2Time').innerText = timeDisplay;
                currentPoet = 1;
                document.getElementById('micHint').innerHTML = "🎤 Нажмите для записи";
                document.getElementById('recognitionStatus').innerHTML = '';
                showToast("✅ Оба поэта записаны! Нажмите 'ОТПРАВИТЬ НА ОЦЕНКУ'", 'success');
            }
            
            saveTournament();
            renderTournament();
            document.getElementById('timer').innerText = "00:00";
        }
        
        function startTimer() {
            recordingSeconds = 0;
            document.getElementById('timer').innerText = "00:00";
            if (recordingTimer) clearInterval(recordingTimer);
            recordingTimer = setInterval(() => {
                recordingSeconds++;
                const mins = Math.floor(recordingSeconds / 60);
                const secs = recordingSeconds % 60;
                document.getElementById('timer').innerText = 
                    `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }, 1000);
        }
        
        function stopTimer() {
            if (recordingTimer) {
                clearInterval(recordingTimer);
                recordingTimer = null;
            }
        }
        
        // АУДИО ФУНКЦИИ
        function downloadAudio(poetNum) {
            if (audioBlobs[poetNum]) {
                const url = URL.createObjectURL(audioBlobs[poetNum]);
                const a = document.createElement('a');
                a.href = url;
                a.download = `poet${poetNum}_battle${currentBattleId+1}.webm`;
                a.click();
                URL.revokeObjectURL(url);
                showToast("📥 Аудио скачано", 'success');
            } else {
                showToast("❌ Аудио не найдено. Сначала запишите выступление.", 'error');
            }
        }
        
        function playAudio(poetNum) {
            if (audioUrls[poetNum]) {
                const audio = new Audio(audioUrls[poetNum]);
                audio.play().catch(e => showToast("❌ Ошибка воспроизведения", 'error'));
            } else {
                showToast("❌ Аудио не найдено", 'error');
            }
        }
        
        // ОТПРАВКА НА ОЦЕНКУ
        async function submitBattle() {
            const battle = tournament[currentBattleId];
            const p1Text = document.getElementById('poet1Text').value.trim();
            const p2Text = document.getElementById('poet2Text').value.trim();
            
            if (p1Text.length < 10) {
                showToast("⚠️ Текст Поэта 1 слишком короткий (минимум 10 символов)", 'warning');
                return;
            }
            if (p2Text.length < 10) {
                showToast("⚠️ Текст Поэта 2 слишком короткий (минимум 10 символов)", 'warning');
                return;
            }
            
            battle.p1Text = p1Text;
            battle.p2Text = p2Text;
            battle.p1Name = document.getElementById('poet1Name').value || battle.p1Name;
            battle.p2Name = document.getElementById('poet2Name').value || battle.p2Name;
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            document.getElementById('loading').classList.add('active');
            
            try {
                const response = await fetch('/api/battle', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: currentBattleId,
                        p1Name: battle.p1Name,
                        p1Text: battle.p1Text,
                        p1Time: battle.p1Time,
                        p2Name: battle.p2Name,
                        p2Text: battle.p2Text,
                        p2Time: battle.p2Time
                    })
                });
                
                const result = await response.json();
                
                if (result.status === "success") {
                    battle.p1Content = parseFloat(result.p1Content) || 0;
                    battle.p1Delivery = parseFloat(result.p1Delivery) || 0;
                    battle.p2Content = parseFloat(result.p2Content) || 0;
                    battle.p2Delivery = parseFloat(result.p2Delivery) || 0;
                    battle.p1Critique = result.p1Critique || "Нет разбора";
                    battle.p2Critique = result.p2Critique || "Нет разбора";
                    battle.verdict = result.totalVerdict || "Нет вердикта";
                    battle.completed = true;
                    
                    saveTournament();
                    renderTournament();
                    
                    showToast("✅ Батл оценён!", 'success');
                    
                    const nextBattle = tournament.findIndex(b => !b.completed);
                    if (nextBattle !== -1) {
                        currentBattleId = nextBattle;
                        openBattle(currentBattleId);
                    } else {
                        showToast("🏆 ТУРНИР ЗАВЕРШЁН! Поздравляем!", 'success');
                        document.getElementById('battleScreen').classList.remove('active');
                        document.getElementById('tournamentScreen').style.display = 'block';
                    }
                } else {
                    throw new Error(result.message || "Ошибка оценки");
                }
            } catch(err) {
                console.error('Submit error:', err);
                showToast("❌ Ошибка: " + err.message, 'error');
            } finally {
                document.getElementById('loading').classList.remove('active');
                submitBtn.disabled = false;
            }
        }
        
        function showResults(battle) {
            const container = document.getElementById('resultsContent');
            document.getElementById('resultsTitle').innerHTML = `Батл ${battle.id + 1}: ${escapeHtml(battle.p1Name)} VS ${escapeHtml(battle.p2Name)}`;
            
            container.innerHTML = `
                <div class="results-card">
                    <div class="score-row">
                        <span class="score-label">Критерий</span>
                        <span class="score-label">${escapeHtml(battle.p1Name)}</span>
                        <span class="score-label">${escapeHtml(battle.p2Name)}</span>
                    </div>
                    <div class="score-row">
                        <span>📝 Содержание (рифмы, образы, смысл)</span>
                        <span>${battle.p1Content}/5</span>
                        <span>${battle.p2Content}/5</span>
                    </div>
                    <div class="score-row">
                        <span>🎙️ Подача (дикция, темп, экспрессия)</span>
                        <span>${battle.p1Delivery}/5</span>
                        <span>${battle.p2Delivery}/5</span>
                    </div>
                    <div class="score-row">
                        <span>⏱️ Время выступления</span>
                        <span>${battle.p1Time}</span>
                        <span>${battle.p2Time}</span>
                    </div>
                </div>
                
                <div class="verdict">
                    <h3 style="color: #d4af37; margin-bottom: 10px;">🏆 ВЕРДИКТ</h3>
                    <p>${escapeHtml(battle.verdict)}</p>
                </div>
                
                <div class="results-card">
                    <h3 style="color: #d4af37; margin-bottom: 10px;">📖 РАЗБОР: ${escapeHtml(battle.p1Name)}</h3>
                    <p>${escapeHtml(battle.p1Critique)}</p>
                </div>
                
                <div class="results-card">
                    <h3 style="color: #d4af37; margin-bottom: 10px;">📖 РАЗБОР: ${escapeHtml(battle.p2Name)}</h3>
                    <p>${escapeHtml(battle.p2Critique)}</p>
                </div>
            `;
            
            document.getElementById('tournamentScreen').style.display = 'none';
            document.getElementById('battleScreen').classList.remove('active');
            document.getElementById('resultsScreen').classList.add('active');
        }
        
        function backToTournament() {
            document.getElementById('resultsScreen').classList.remove('active');
            document.getElementById('tournamentScreen').style.display = 'block';
            renderTournament();
        }
        
        function exitBattle() {
            if (isRecording && confirm("Запись активна. Выйти?")) {
                stopRecording();
            }
            document.getElementById('battleScreen').classList.remove('active');
            document.getElementById('tournamentScreen').style.display = 'block';
            renderTournament();
        }
        
        function resetTournament() {
            if (confirm("Сбросить весь турнир? Все данные будут потеряны!")) {
                localStorage.removeItem('poetryTournament');
                audioBlobs = { 1: null, 2: null };
                audioUrls = { 1: null, 2: null };
                location.reload();
            }
        }
        
        function checkMicrophone() {
            // Проверяем Web Speech API
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                showToast("✅ Web Speech API поддерживается", 'success');
            } else {
                showToast("❌ Web Speech API НЕ поддерживается", 'error');
            }
            
            // Проверяем микрофон
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then(stream => {
                        showToast("✅ Микрофон работает!", 'success');
                        stream.getTracks().forEach(track => track.stop());
                    })
                    .catch(err => {
                        showToast("❌ Микрофон НЕ ДОСТУПЕН: " + err.message, 'error');
                    });
            } else {
                showToast("❌ Ваш браузер не поддерживает микрофон", 'error');
            }
        }
        
        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast';
            if (type === 'error') toast.classList.add('error');
            if (type === 'warning') toast.classList.add('warning');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // АВТОСОХРАНЕНИЕ
        document.getElementById('poet1Text')?.addEventListener('input', function() {
            if (tournament[currentBattleId]) {
                tournament[currentBattleId].p1Text = this.value;
                saveTournament();
            }
        });
        
        document.getElementById('poet2Text')?.addEventListener('input', function() {
            if (tournament[currentBattleId]) {
                tournament[currentBattleId].p2Text = this.value;
                saveTournament();
            }
        });
        
        document.getElementById('poet1Name')?.addEventListener('change', function() {
            if (tournament[currentBattleId]) {
                tournament[currentBattleId].p1Name = this.value;
                saveTournament();
                renderTournament();
            }
        });
        
        document.getElementById('poet2Name')?.addEventListener('change', function() {
            if (tournament[currentBattleId]) {
                tournament[currentBattleId].p2Name = this.value;
                saveTournament();
                renderTournament();
            }
        });
        
        // ЗАПУСК
        initTournament();
        document.getElementById('micBtn').onclick = () => {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        };
        document.getElementById('submitBtn').onclick = submitBattle;
    </script>
</body>
</html>
